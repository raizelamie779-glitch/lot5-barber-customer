<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Customer Status - LOT 5 Barbershop</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary": "#c6c6c7",
                        "surface-tint": "#e9c400",
                        "inverse-on-surface": "#303030",
                        "on-surface-variant": "#d0c6ab",
                        "on-tertiary": "#003911",
                        "tertiary-fixed": "#6bff83",
                        "on-tertiary-fixed-variant": "#00531b",
                        "inverse-primary": "#705d00",
                        "outline-variant": "#4d4732",
                        "outline": "#999077",
                        "background": "#131313",
                        "secondary-fixed": "#e2e2e2",
                        "tertiary": "#dfffdb",
                        "primary-container": "#ffd700",
                        "on-secondary-fixed-variant": "#454747",
                        "surface-container-low": "#1b1b1b",
                        "surface": "#131313",
                        "surface-bright": "#393939",
                        "on-secondary-fixed": "#1a1c1c",
                        "on-error": "#690005",
                        "on-primary": "#3a3000",
                        "on-background": "#e2e2e2",
                        "secondary-container": "#454747",
                        "primary-fixed": "#ffe16d",
                        "surface-container-high": "#2a2a2a",
                        "surface-dim": "#131313",
                        "on-surface": "#e2e2e2",
                        "on-tertiary-fixed": "#002107",
                        "error": "#ffb4ab",
                        "on-primary-fixed": "#221b00",
                        "surface-container-highest": "#353535",
                        "on-tertiary-container": "#006e27",
                        "error-container": "#93000a",
                        "on-primary-container": "#705e00",
                        "primary": "#fff6df",
                        "surface-container": "#1f1f1f",
                        "on-secondary": "#2f3131",
                        "on-secondary-container": "#b4b5b5",
                        "on-primary-fixed-variant": "#544600",
                        "on-error-container": "#ffdad6",
                        "tertiary-container": "#00fb64",
                        "surface-variant": "#353535",
                        "tertiary-fixed-dim": "#00e55b",
                        "primary-fixed-dim": "#e9c400",
                        "surface-container-lowest": "#0e0e0e",
                        "inverse-surface": "#e2e2e2",
                        "secondary-fixed-dim": "#c6c6c7"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-lg": "32px",
                        "stack-md": "16px",
                        "stack-sm": "8px",
                        "stack-xl": "64px",
                        "gutter": "16px",
                        "container-padding": "32px",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "headline-xl": ["Inter"],
                        "label-bold": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-sm": ["Inter"]
                    },
                    "fontSize": {
                        "headline-xl": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "800" }],
                        "label-bold": ["14px", { "lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-sm": ["12px", { "lineHeight": "1.2", "letterSpacing": "0.02em", "fontWeight": "500" }]

                }

<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar from JSON -->
<header class="bg-black text-yellow-400 font-bold tracking-tighter uppercase Inter docked full-width top-0 border-b border-zinc-900 flat no shadows fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4">
<button aria-label="Menu" class="text-zinc-400 hover:text-yellow-400 transition-colors active:scale-95 duration-200 flex items-center justify-center">
<span class="material-symbols-outlined text-3xl" data-icon="menu">menu</span>
</button>
<span class="text-2xl font-black tracking-widest text-yellow-400">LOT 5 BARBERSHOP</span>
<div class="w-8"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col pt-[88px] px-container-padding pb-container-padding max-w-3xl mx-auto w-full">
<!-- Hero Status -->
<section class="flex flex-col items-center justify-center py-stack-xl text-center space-y-stack-sm mb-auto mt-auto">
<h2 class="font-label-bold text-label-bold text-outline uppercase tracking-widest">Current Status</h2>
<div id="queue-position" class="font-headline-xl text-headline-xl text-primary-container uppercase drop-shadow-[0_0_15px_rgba(255,215,0,0.3)]">
                Loading...
            </div>
<p class="font-body-lg text-body-lg text-on-surface-variant mt-stack-md">
                Estimated wait time: <span id="wait-time" class="text-on-surface font-bold">~-- mins</span>
</p>
</section>
<!-- Actions -->
<section class="mt-auto flex flex-col items-center space-y-stack-md">
<!-- Secondary Button Style per guidelines: transparent bg, 2px white border, white text -->
<button id="cancel-btn" class="w-full md:w-auto px-12 py-4 bg-transparent border-2 border-white text-white font-label-bold text-label-bold uppercase tracking-widest hover:bg-white hover:text-black transition-all duration-300 active:scale-95">
                Cancel My Spot
            </button>
<div class="flex items-center justify-center space-x-2 text-on-surface-variant opacity-70">
<span class="material-symbols-outlined text-sm" data-icon="sms">sms</span>
<p class="font-label-sm text-label-sm">We'll text you when you're next up.</p>
</div>
</section>
</main>
</body></html>
